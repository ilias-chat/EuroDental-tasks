<div
  class="shell"
  [class.shell--guest]="!auth.isAuthenticated()"
  [class.shell--sidebar-collapsed]="auth.isAuthenticated() && sidebarCollapsed()"
>
  @if (auth.isAuthenticated()) {
    <aside class="shell__sidebar" aria-label="Navigation principale">
      <div class="shell__sidebar-header">
        <button
          type="button"
          class="shell__toggle"
          (click)="toggleSidebar()"
          [attr.aria-expanded]="!sidebarCollapsed()"
          [attr.title]="sidebarCollapsed() ? 'Ouvrir le menu' : 'Réduire le menu'"
        >
          <svg class="shell__toggle-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
            <line x1="9" y1="5" x2="9" y2="19" />
          </svg>
        </button>
      </div>
      <nav class="shell__nav">
        <a
          class="shell__nav-item"
          routerLink="/tasks"
          routerLinkActive="shell__nav-item--active"
          [routerLinkActiveOptions]="{ exact: true }"
          [attr.title]="sidebarCollapsed() ? 'Tâches' : null"
        >
          <svg class="shell__nav-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect width="8" height="4" x="8" y="2" rx="1" ry="1" />
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
            <path d="M12 11h4" />
            <path d="M12 16h4" />
            <path d="M8 11h.01" />
            <path d="M8 16h.01" />
          </svg>
          <span class="shell__nav-text">Tâches</span>
        </a>
      </nav>

      <div class="shell__user-bar">
        <div class="shell__user-main">
          @if (auth.user()?.image) {
            <img class="shell__avatar shell__avatar--img" [src]="auth.user()!.image!" alt="" />
          } @else {
            <div class="shell__avatar" aria-hidden="true">{{ userInitial() }}</div>
          }
          <div class="shell__user-text">
            <span class="shell__user-name">{{ fullNameUpper() }}</span>
            <span class="shell__user-sub">{{ profileLabel() }}</span>
          </div>
        </div>
        <button
          type="button"
          class="shell__logout-btn"
          (click)="logout()"
          title="Déconnexion"
          aria-label="Déconnexion"
        >
          <svg class="shell__logout-btn-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" x2="9" y1="12" y2="12" />
          </svg>
        </button>
      </div>
    </aside>
  }
  <main class="shell__main" [class.shell__main--guest]="!auth.isAuthenticated()">
    <div class="shell__main-inner">
      <router-outlet />
    </div>
  </main>

  @if (auth.isAuthenticated()) {
    <aside class="shell__rail" aria-label="Actions rapides">
      <div class="shell__rail-inner">
        <button
          type="button"
          class="shell__rail-btn"
          (click)="onRailNewTask()"
          title="Nouvelle tâche"
          aria-label="Nouvelle tâche"
        >
          <svg class="shell__rail-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="16" />
            <line x1="8" y1="12" x2="16" y2="12" />
          </svg>
        </button>
        <button
          type="button"
          class="shell__rail-btn"
          [class.shell__rail-btn--active]="tasksStore.filterPanelOpen()"
          (click)="onRailToggleFilter()"
          title="Filtrer"
          aria-label="Filtrer"
        >
          <svg class="shell__rail-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z" />
          </svg>
        </button>
        <button
          type="button"
          class="shell__rail-btn"
          [class.shell__rail-btn--active]="tasksStore.paymentsDrawerOpen()"
          (click)="onRailToggleDeliveredPayments()"
          title="Paiements remis à l'administration"
          aria-label="Paiements remis à l'administration"
        >
          <svg class="shell__rail-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="6" width="20" height="12" rx="2" ry="2" />
            <circle cx="12" cy="12" r="2.25" />
          </svg>
        </button>
        @if (canUseTaskTracking()) {
          <button
            type="button"
            class="shell__rail-btn"
            [class.shell__rail-btn--active]="tasksStore.trackingDrawerOpen()"
            (click)="onRailToggleTracking()"
            title="Suivi des tâches"
            aria-label="Suivi des tâches"
          >
            <svg class="shell__rail-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
          </button>
        }
      </div>
      <div class="shell__rail-footer">
        <button
          type="button"
          class="shell__rail-btn"
          (click)="onToggleTheme()"
          [attr.title]="theme.isDark() ? 'Thème clair' : 'Thème sombre'"
          [attr.aria-label]="theme.isDark() ? 'Activer le thème clair' : 'Activer le thème sombre'"
        >
          @if (theme.isDark()) {
            <svg class="shell__rail-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4" />
              <line x1="12" y1="2" x2="12" y2="4" />
              <line x1="12" y1="20" x2="12" y2="22" />
              <line x1="4.93" y1="4.93" x2="6.34" y2="6.34" />
              <line x1="17.66" y1="17.66" x2="19.07" y2="19.07" />
              <line x1="2" y1="12" x2="4" y2="12" />
              <line x1="20" y1="12" x2="22" y2="12" />
              <line x1="6.34" y1="17.66" x2="4.93" y2="19.07" />
              <line x1="19.07" y1="4.93" x2="17.66" y2="6.34" />
            </svg>
          } @else {
            <svg class="shell__rail-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          }
        </button>
      </div>
    </aside>
  }
</div>
