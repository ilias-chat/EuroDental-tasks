<form class="login-page" (submit)="$event.preventDefault(); doLogin()">
  <div class="login-page__field">
    <input
      id="email"
      name="email"
      type="email"
      [(ngModel)]="email"
      autocomplete="username"
      placeholder="E-mail"
      required
    />
  </div>
  <div class="login-page__field">
    <input
      id="password"
      name="password"
      type="password"
      [(ngModel)]="password"
      autocomplete="current-password"
      placeholder="Mot de passe"
      required
    />
  </div>
  @if (loginError()) {
    <div class="login-page__error">{{ loginError() }}</div>
  }
  <button type="submit" class="login-page__submit" [disabled]="loginPending()">
    {{ loginPending() ? 'Connexion…' : 'Se connecter' }}
  </button>
</form>

<button
  type="button"
  class="login-page__theme"
  (click)="toggleTheme()"
  [attr.title]="theme.isDark() ? 'Thème clair' : 'Thème sombre'"
  [attr.aria-label]="theme.isDark() ? 'Activer le thème clair' : 'Activer le thème sombre'"
>
  @if (theme.isDark()) {
    <svg class="login-page__theme-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="4" />
      <line x1="12" y1="2" x2="12" y2="4" />
      <line x1="12" y1="20" x2="12" y2="22" />
      <line x1="4.93" y1="4.93" x2="6.34" y2="6.34" />
      <line x1="17.66" y1="17.66" x2="19.07" y2="19.07" />
      <line x1="2" y1="12" x2="4" y2="12" />
      <line x1="20" y1="12" x2="22" y2="12" />
      <line x1="6.34" y1="17.66" x2="4.93" y2="19.07" />
      <line x1="19.07" y1="4.93" x2="17.66" y2="6.34" />
    </svg>
  } @else {
    <svg class="login-page__theme-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
    </svg>
  }
</button>
